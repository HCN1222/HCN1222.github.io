name: Deploy Pages redirect

# Publishes a tiny static site that redirects hcn1222.github.io to the live
# Vercel deployment. Runs only when the redirect files change, so normal
# content pushes do not trigger a Pages build.
on:
  push:
    branches: [main]
    paths:
      - "pages-redirect/**"
      - ".github/workflows/pages-redirect.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload redirect artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-redirect
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
